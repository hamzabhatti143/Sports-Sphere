version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sportspot-db
    environment:
      POSTGRES_USER: sportspot
      POSTGRES_PASSWORD: sportspot
      POSTGRES_DB: sportspot
    ports:
      - "5432:5432"
    volumes:
      - sportspot_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportspot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sportspot_db:
